dataset:
  type: flat csv
  path: curated_datasets/TataTrent_Westside/curation/curated_issues_final_part_2.csv
  keep_bounding_boxes: true
  output_dir: output/westside/
  cache_dir: output/westside/cache/

detection_models:
  - model_type: locate_anything
    api_endpoint: http://localhost:8080/detect_classes
    decoding_mode: slow
    class_groups:
      - [top, bottom, outerwear, dress, skirt]
      - [innertop, onepiece, ethnic_wear, swimwear, underwear_top, underwear_bottom]
      - [shoe, bag, product_item]
      - [headwear, eyewear, hair_accessories, scarf]
      - [earring, necklace, head_jewelry, tie]
      - [ring, bracelet, watch, belt, gloves, anklet, jewelry_product]
    classes: [shoe, top, product_item, bottom, outerwear, bag, dress, eyewear, ethnic_wear, headwear, bracelet, watch, skirt, earring, jewelry_product, scarf, necklace, belt, gloves, tie, underwear_bottom, swimwear, underwear_top, ring, onepiece, hair_accessories, head_jewelry, anklet, innertop]

dedup_policy:
  general:
    IOU: 0.7
    IOMin: 0.7
    keep_which: keep smallest

llm_validation:
  model_type: gpt-4.1-mini
  prompt: llm/prompts/verify_classes_prompt.txt
  classes: [hair_accessories, earring, innertop, ring]
  general:
    padding: 0.0

  ring:
    padding: 0.1

  hair_accessories:
    padding: 0.0
    task: "Verify if there is an obvious worn hair accessory (e.g. headband, hairclip, bandana, headscarf) on the person. Do NOT count plain hair ties or hair strands."

  earring:
    padding: 0.2
    task: "Verify if jewelry is attached to the ear/lobe. Do NOT mistake hair strands, highlights, or specular spots for earrings."

  innertop:
    padding: 0.4
    task: "Verify if the item is an innertop — defined as ANY top/shirt/t-shirt/vest that is worn as an inner layer underneath visible outerwear (such as a jacket, coat, blazer, cardigan, or unbuttoned overshirt). The person must be wearing visible outerwear surrounding the top. Do NOT classify standalone tops without outer layers as innertop."

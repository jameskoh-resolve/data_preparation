# Auto-annotate config for TataTrent Westside part 2.
#
# Workflow (single config for both steps):
#
#   1. Prep images on a machine with internet access (uploads to Azure, generates SAS URLs):
#        PYTHONPATH=. .venv/bin/python curation/auto_annotate.py prep-azure configs/auto_annotate_westside_part_2.yaml
#
#   2. Commit + push, then on the Azure GPU (git pull):
#        PYTHONPATH=. .venv/bin/python curation/auto_annotate.py main configs/auto_annotate_westside_part_2.yaml
#
#      The script auto-detects azure_datasets/curated_issues_final_part_2.csv and uses it.
#      No separate GPU config needed.

dataset:
  type: flat csv
  path: curated_datasets/TataTrent_Westside/curation/curated_issues_final_part_2.csv
  keep_bounding_boxes: true
  output_dir: output/westside/
  use_prediction_cache: false 
  # azure_folder: azure_datasets  # (default) where prep-azure writes the Azure CSV

detection_models:
  - model_type: locate_anything
    api_endpoint: http://localhost:8080/detect_classes
    decoding_mode: hybrid
    use_batch_api: true
    batch_size: 8
    max_classes_per_prompt: 15
    class_groups:
      - [earring, necklace, bracelet, watch, ring, shoe]
    classes: [earring, necklace, bracelet, watch, ring, shoe]
    # class_aliases: query the API with subcategory terms and remap to a canonical output class.
    # The canonical name (e.g. hair_accessories) must also be in 'classes' above.
    # class_aliases:
    #   hair_accessories:
    #     - hijab
    #     - headband
    #     - headscarf
    #     - bandana
    #     - large hairband
    #     - hair accessories   # space form — in case the API returns this label directly
dedup_policy:
  general:
    IOU: 0.7
    IOMin: 0.7
    keep_which: keep smallest 

llm_validation:
  model_type: gpt-4.1-mini
  prompt: llm/prompts/verify_classes_prompt.txt
  max_boxes_per_image: 12
  max_boxes_per_class: 6
  # classes omitted — validates ALL detected classes
  general:
    padding: 0.05
    # Upscale tiny crops before LLM validation to reduce "too blurry/unclear" failures.
    min_crop_short_side: 224
    min_crop_long_side: 320
    upscale_interpolation: lanczos
    # Keep encoding quality high for small detailed accessories.
    jpeg_quality: 99

  # ── Clothing ───────────────────────────────────────────────────────────────

  top:
    padding: 0.0
    task: "Verify if the crop shows a top-half garment (shirt, blouse, t-shirt, tank top, polo) worn on a person's upper body as the main visible top layer. The crop (without padding) must contain a substantial portion (at least 50%) of the top garment. Reject tight crops or tiny fragments showing less than 50% of the item. Do NOT classify an innertop worn under outerwear as a standalone top."

  bottom:
    padding: 0.0
    task: "Verify if the crop shows a bottom-half garment (trousers, jeans, shorts, leggings, culottes) worn on a person's lower body. The crop (without padding) must contain a substantial portion (at least 50%) of the bottom garment. Reject tight crops or tiny fragments showing less than 50% of the item."

  dress:
    padding: 0.0
    task: "Verify if the crop shows a dress — a one-piece garment covering both upper and lower body. The crop (without padding) must contain a substantial portion (at least 50%) of the dress. Reject tight crops or fragments showing less than 50% of the dress. Do NOT classify a separate top+bottom combination as a dress."

  skirt:
    padding: 0.0
    task: "Verify if the crop shows a skirt as a separate lower-body garment (visually distinct from a dress). The crop (without padding) must contain a substantial portion (at least 50%) of the skirt. Reject tight crops or fragments showing less than 50% of the item."

  outerwear:
    padding: 0.0
    task: "Verify if the crop shows outerwear (jacket, coat, blazer, cardigan, bomber jacket) worn as the outermost layer over other clothing. The crop (without padding) must contain a substantial portion (at least 50%) of the outerwear garment. Reject tight crops or fragments showing less than 50% of the item."

  innertop:
    padding: 0.05
    task: "Verify if the item is an innertop — defined as ANY top/shirt/t-shirt/vest worn as an inner layer underneath visible outerwear (such as a jacket, coat, blazer, cardigan, or unbuttoned overshirt). The crop must show a substantial portion (at least 50%) of the innertop garment along with surrounding visible outerwear. Do NOT classify standalone tops without outer layers as innertop."

  ethnic_wear:
    padding: 0.0
    task: "Verify if the garment shown is ethnic or traditional wear (e.g. saree, kurta, lehenga, salwar kameez, sherwani, dhoti). The crop (without padding) must contain a substantial portion (at least 50%) of the ethnic garment. Do NOT classify Western-style clothing as ethnic_wear."

  # ── Footwear & Accessories ─────────────────────────────────────────────────

  shoe:
    padding: 0.05
    task: "Verify if there is a clearly visible shoe, sneaker, boot, sandal, or other footwear on a person's foot/feet."

  bag:
    padding: 0.05
    task: "Verify if there is a clearly visible bag, backpack, purse, clutch, or handbag carried by or near a person."

  belt:
    padding: 0.05
    task: "Verify if there is a clothing belt clearly visible around a person's waist or hips, typically showing a leather strap or buckle. Do NOT confuse seams, fabric folds, bag straps, or plain waistbands as a belt."

  tie:
    padding: 0.05
    task: "Verify if the person is wearing a necktie or bowtie around their neck."

  gloves:
    padding: 0.05
    task: "Verify if the person is wearing gloves or mittens clearly covering their hands or fingers."

  scarf:
    padding: 0.1
    task: "Verify if the person is wearing a scarf draped around their neck, shoulders, or head as a textile accessory. Do NOT confuse a scarf with a collar, lapel, or regular neckline of a top."

  eyewear:
    padding: 0.1
    task: "Verify if the person is wearing glasses, sunglasses, or spectacles on their face. The frames or lenses must be clearly visible."

  headwear:
    padding: 0.1
    task: "Verify if the person is wearing a hat, cap, beanie, or balaclava on their head. Do NOT classify headbands, hair clips, or hijabs as headwear."

  hair_accessories:
    padding: 0.8
    task: "Verify if there is an obvious worn hair accessory (e.g. hijab, headband, hairclip, bandana, headscarf) on the person's head/hair. The crop includes surrounding head context — verify that the hair accessory is clearly worn on the head/hair. Do NOT count plain hair ties, hair strands, or background items."

  # ── Jewelry ────────────────────────────────────────────────────────────────

  earring:
    padding: 0.8
    task: "Verify if an earring or ear jewelry is clearly attached to a person's ear or earlobe. The crop includes surrounding ear/head context — confirm the item is attached to an earlobe. Do NOT mistake hair strands, skin highlights, or specular spots for earrings."

  necklace:
    padding: 0.4
    task: "Verify if there is a necklace, chain, pendant, or choker clearly visible around a person's neck. It must be a distinct jewelry item, not just a collar or neckline of clothing."

  bracelet:
    padding: 0.5
    task: "Verify if there is any bracelet, bangle, cuff, wristband, string/thread band, or arm chain visible on a person's wrist or arm. Accept any wrist/arm jewelry item or band."

  watch:
    padding: 0.8
    task: "Verify if there is a watch worn on a person's wrist AND that a distinct, clearly visible watch face (analog clock face, digital display, or smartwatch screen) is explicitly visible. If the watch face is hidden, turned away, or not clearly visible, mark as INVALID."

  ring:
    padding: 1.2
    task: "Verify if there is a ring clearly visible worn on a human finger. The crop includes surrounding hand context — confirm that the ring is attached to a human finger on a hand. Do NOT mistake nail polish, skin texture, background objects, or loose standalone objects as a worn ring."

  head_jewelry:
    padding: 0.15
    task: "Verify if the person is wearing jewelry on their head or forehead (e.g. maang tikka, matha patti, forehead chain, head chain). Do NOT classify headbands, hair clips, or regular headwear as head_jewelry."

  anklet:
    padding: 0.15
    task: "Verify if there is a clearly visible anklet or ankle bracelet worn around a person's ankle. Do NOT mistake shoe straps, sock edges, or leg outlines as an anklet."

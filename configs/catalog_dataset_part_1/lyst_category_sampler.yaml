# Category sampling config for Lyst — catalog_dataset_part_1
# Run: PYTHONPATH=. .venv/bin/python curation/sampling/category_sampler.py configs/catalog_dataset_part_1/lyst_category_sampler.yaml

catalog:
  csv: catalogs/lyst_catalog.csv
  image_url_column: main_image_url
  additional_image_column: additional_image_url
  category_column: category
  gender_column: gender

filter_spec: curated_datasets/Lyst/categories/lyst_combined_filter_spec.yaml

dedup:
  exclude_urls_csv: curated_datasets/combined_catalogs/v4/accessory_detect_v4_dataset.csv
  exclude_hash_column: im_name

sampling:
  total_target: 9999999
  min_per_category: 30
  max_per_category: 9999999
  random_seed: 42
  # per_category_target: {}  # optional overrides for specific categories

output:
  pool_csv: curated_datasets/combined_catalogs/catalog_dataset_part_1/lyst/category_sample_pool.csv
  stats_csv: curated_datasets/combined_catalogs/catalog_dataset_part_1/lyst/category_sample_stats.csv

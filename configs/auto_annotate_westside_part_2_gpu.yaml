# GPU variant of auto_annotate_westside_part_2.yaml
# Use this config on the Azure GPU where curated_datasets/ is not available.
# Images are fetched directly from Azure Blob Storage SAS URLs in the azure_datasets CSV.
# Generate the azure CSV first (on a machine with internet access):
#   PYTHONPATH=. .venv/bin/python curation/auto_annotate.py prep-azure configs/auto_annotate_westside_part_2.yaml
# Then run this config on the GPU:
#   PYTHONPATH=. .venv/bin/python curation/auto_annotate.py main configs/auto_annotate_westside_part_2_gpu.yaml

dataset:
  type: flat csv
  path: azure_datasets/curated_issues_final_part_2.csv  # SAS URLs generated by prep-azure
  keep_bounding_boxes: true
  output_dir: output/westside/
  # No cache_dir needed — images are fetched directly from Azure SAS URLs

detection_models:
  - model_type: locate_anything
    api_endpoint: http://localhost:8080/detect_classes
    decoding_mode: slow
    class_groups:
      - [top, bottom, dress, skirt]
      - [outerwear, innertop, ethnic_wear]
      - [shoe, bag, belt, tie]
      - [headwear, hair_accessories, scarf]  # hair_accessories expanded to aliases below
      - [earring, necklace, bracelet, watch, anklet, jewelry_product]
      - [ring, gloves, head_jewelry]
    classes: [shoe, top, bottom, outerwear, bag, dress, eyewear, ethnic_wear, headwear, bracelet, watch, skirt, earring, scarf, necklace, belt, gloves, tie, underwear_bottom, swimwear, underwear_top, ring, onepiece, hair_accessories, head_jewelry, anklet, innertop]
    # class_aliases: query the API with subcategory terms and remap to a canonical output class.
    # The canonical name (e.g. hair_accessories) must also be in 'classes' above.
    class_aliases:
      hair_accessories:
        - hijab
        - headband
        - headscarf
        - bandana
        - large hairband

dedup_policy:
  general:
    IOU: 0.7
    IOMin: 0.7
    keep_which: keep smallest

llm_validation:
  model_type: gpt-4.1-mini
  prompt: llm/prompts/verify_classes_prompt.txt
  classes: [hair_accessories, earring, innertop, ring]
  general:
    padding: 0.0

  ring:
    padding: 0.1

  hair_accessories:
    padding: 0.0
    task: "Verify if there is an obvious worn hair accessory (e.g. hijab, headband, hairclip, bandana, headscarf) on the person. Do NOT count plain hair ties or hair strands."

  earring:
    padding: 0.2
    task: "Verify if jewelry is attached to the ear/lobe. Do NOT mistake hair strands, highlights, or specular spots for earrings."

  innertop:
    padding: 0.4
    task: "Verify if the item is an innertop — defined as ANY top/shirt/t-shirt/vest that is worn as an inner layer underneath visible outerwear (such as a jacket, coat, blazer, cardigan, or unbuttoned overshirt). The person must be wearing visible outerwear surrounding the top. Do NOT classify standalone tops without outer layers as innertop."
